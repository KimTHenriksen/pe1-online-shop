<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width-device-width, initial-scale=1.0" />
    <title>Product Feed</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <header>
      <nav>
        <a href="index.html" class="logo">
          <img src="images/logo.svg" alt="Online Shop" />
        </a>
        <ul>
          <li><a href="index.html">Products</a></li>
          <li><a href="">Cart</a></li>
          <li><a href="">Login</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="loading-message">Loading products...</div>
      <div class="error-message">Something went wrong</div>
      <section class="carousel">
        <button class="carousel-left" aria-label="Previous product"><</button>
        <div class="carousel-box"></div>
        <button class="carousel-right" aria-label="Next product">></button>
      </section>

      <section class="products">
        <h1>All Products</h1>

        <div class="grid-products"></div>
      </section>
    </main>

    <footer></footer>

    <script type="module" src="js/index.js"></script>
  </body>
</html>
