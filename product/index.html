<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specific Product Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/product.css" />
  </head>
  <body>
    <main class="product-page">
      <div class="loading-message">Loading product...</div>
      <div class="error-message">Something went wrong</div>
      <section class="product-details">
        <div class="product-image"></div>

        <div class="product-info">
          <h1 class="product-title"></h1>
          <p class="product-description"></p>

          <div class="product-price">
            <p class="price"></p>
            <p class="discounted-price"></p>
          </div>

          <div class="product-rating"></div>
          <div class="product-tags-share">
            <div class="product-tags"></div>
            <div class="share-box">
              <button
                class="product-share"
                type="button"
                aria-label="Share product"
              >
                <img src="../images/Share.svg" alt="" />
              </button>

              <p class="share-message"></p>
            </div>
          </div>

          <button class="primary-button add-to-cart">Add to Cart</button>
        </div>
      </section>
      <section class="reviews">
        <h2>Reviews</h2>
        <div class="reviews-container"></div>
      </section>
    </main>
    <script type="module" src="../js/product.js"></script>
  </body>
</html>
