<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/account.css" />
  </head>
  <body>
    <main class="account-page">
      <section class="account-card">
        <h1>Register</h1>
        <p class="account-text">Create you account</p>
        <form id="registerForm" class="account-form">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Name"
            required
          />
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email"
            required
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
          <p id="registerMessage"></p>
          <button class="primary-button" type="submit">Register</button>
          <p class="account-link">
            Already have an account? <a href="login.html">Login</a>
          </p>
        </form>
      </section>
    </main>
    <script type="module" src="../js/register.js"></script>
  </body>
</html>
